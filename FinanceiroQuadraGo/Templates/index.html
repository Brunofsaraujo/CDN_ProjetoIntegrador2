<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-4">
    <h1 class="text-center mb-4">Lista de Quadras</h1>
    <div class="d-flex justify-content-end mb-3">
        <a href="{{ url_for('quadras.add_quadra') }}" class="btn btn-primary">Adicionar Nova Quadra</a>
    </div>
    
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Nome da Quadra</th>
                <th>Localização</th>
                <th>Preço por Hora</th>
                <th>Status (Ativo)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for quadra in quadras %}
            <tr>
                <td>{{ quadra['Nome_Quadra'] }}</td>
                <td>{{ quadra['Localizacao'] }}</td>
                <td>R$ {{ quadra['Preco_Hora'] }}</td>
                <td>
                    {% if quadra['Ativo'] == 'Y' %}
                        <span class="badge bg-success">Sim</span>
                    {% else %}
                        <span class="badge bg-danger">Não</span>
                    {% endif %}
                </td>
                <td>
                    <a href="{{ url_for('quadras.edit_quadra', id=quadra['ID_Quadra']) }}" class="btn btn-warning btn-sm">Editar</a>
                    <form action="{{ url_for('quadras.delete_quadra', id=quadra['ID_Quadra']) }}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">Deletar</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
